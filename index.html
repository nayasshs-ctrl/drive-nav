<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f1923">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="DRIVE">
<link rel="manifest" href="manifest.json">
<title>DRIVE — 네비게이션</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#0f1923;--card:#151f2e;--card2:#1a2535;--border:#1e2d40;
  --accent:#4fffb0;--blue:#4dabf7;--orange:#ff922b;--red:#ff6b6b;
  --text:#e8f0fe;--muted:#4a6080;--shadow:0 4px 24px rgba(0,0,0,0.5);
}
html,body{height:100%;overflow:hidden;background:var(--bg);}
body{font-family:'Plus Jakarta Sans',sans-serif;color:var(--text);}
#map{position:fixed;inset:0;width:100%;height:100%;min-height:100vh;}

/* MODAL */
#api-modal{position:fixed;inset:0;z-index:600;background:rgba(15,25,35,0.98);display:flex;align-items:flex-end;}
.msheet{background:var(--card);border-radius:28px 28px 0 0;padding:28px 22px 44px;width:100%;max-height:92vh;overflow-y:auto;}
.mhandle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 22px;}
.mbrand{display:flex;align-items:center;gap:12px;margin-bottom:22px;}
.micon{width:50px;height:50px;background:var(--accent);border-radius:14px;display:flex;align-items:center;justify-content:center;}
.micon svg{width:26px;height:26px;fill:#0f1923;}
.mname{font-size:1.4rem;font-weight:800;}
.msub{font-size:0.68rem;color:var(--muted);font-family:'JetBrains Mono',monospace;}
.mlbl{font-size:0.66rem;font-weight:700;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:7px;font-family:'JetBrains Mono',monospace;}
.minp{width:100%;background:var(--card2);border:1.5px solid var(--border);border-radius:13px;padding:14px 16px;font-family:'Plus Jakarta Sans',sans-serif;font-size:0.9rem;color:var(--text);outline:none;margin-bottom:14px;transition:border-color 0.2s;}
.minp:focus{border-color:var(--accent);}
.minp::placeholder{color:var(--muted);}
.minfo{background:rgba(79,255,176,0.06);border:1px solid rgba(79,255,176,0.15);border-radius:12px;padding:12px 14px;margin-bottom:20px;}
.minfo p{font-size:0.74rem;color:rgba(79,255,176,0.8);line-height:1.7;}
.minfo a{color:var(--accent);text-decoration:none;font-weight:600;}
.mbtn{width:100%;padding:15px;background:var(--accent);border:none;border-radius:13px;color:#0f1923;font-family:'Plus Jakarta Sans',sans-serif;font-size:1rem;font-weight:800;cursor:pointer;margin-bottom:10px;}
.mbtn:active{opacity:0.85;}
.mbtn2{width:100%;padding:12px;background:transparent;border:1.5px solid var(--border);border-radius:12px;color:var(--muted);font-family:'Plus Jakarta Sans',sans-serif;font-size:0.86rem;cursor:pointer;}
.mbtn2:active{background:var(--card2);}

/* STATUS BAR */
#sbar{position:fixed;top:0;left:0;right:0;z-index:100;padding:env(safe-area-inset-top,0px) 14px 0;height:calc(52px + env(safe-area-inset-top,0px));display:flex;align-items:center;justify-content:space-between;background:linear-gradient(180deg,rgba(15,25,35,0.92) 0%,transparent 100%);}
.slogo{font-size:1rem;font-weight:800;letter-spacing:0.06em;color:var(--accent);}
.gpschip{background:rgba(21,31,46,0.9);border:1px solid var(--border);border-radius:50px;padding:6px 11px;font-size:0.67rem;font-weight:600;font-family:'JetBrains Mono',monospace;display:flex;align-items:center;gap:5px;backdrop-filter:blur(10px);}
.gpsdot{width:6px;height:6px;border-radius:50%;background:var(--muted);transition:background 0.3s;}
.gpsdot.live{background:var(--accent);animation:blink 2s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}

/* SEARCH PANEL */
#spanel{position:fixed;top:calc(54px + env(safe-area-inset-top,0px));left:12px;right:12px;z-index:90;transition:opacity 0.3s;}
.swrap{background:rgba(21,31,46,0.96);border:1px solid var(--border);border-radius:20px;padding:13px;backdrop-filter:blur(20px);box-shadow:var(--shadow);}
.sinputs{background:var(--card2);border-radius:13px;overflow:hidden;border:1px solid var(--border);margin-bottom:10px;}
.srow{display:flex;align-items:center;gap:10px;padding:11px 13px;}
.srow+.srow{border-top:1px solid var(--border);}
.sdot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.sdot.a{background:var(--accent);}
.sdot.b{background:var(--orange);}
.srow input{flex:1;background:transparent;border:none;outline:none;font-family:'Plus Jakarta Sans',sans-serif;font-size:0.9rem;color:var(--text);}
.srow input::placeholder{color:var(--muted);}
.swapbtn{width:28px;height:28px;background:var(--card);border:1px solid var(--border);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:transform 0.3s;}
.swapbtn:active{transform:rotate(180deg);}
.swapbtn svg{width:13px;height:13px;color:var(--muted);}
.gobtn{width:100%;padding:13px;background:var(--accent);border:none;border-radius:12px;color:#0f1923;font-family:'Plus Jakarta Sans',sans-serif;font-size:0.95rem;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;}
.gobtn:active{opacity:0.85;}

/* ROUTE SHEET */
#rsheet{position:fixed;bottom:0;left:0;right:0;z-index:90;transform:translateY(100%);transition:transform 0.4s cubic-bezier(0.23,1,0.32,1);}
#rsheet.up{transform:translateY(0);}
.rs{background:var(--card);border-radius:24px 24px 0 0;padding:16px 18px calc(24px + env(safe-area-inset-bottom,0px));box-shadow:0 -8px 40px rgba(0,0,0,0.5);}
.rshandle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px;}
.rshead{display:flex;align-items:center;justify-content:space-between;margin-bottom:13px;}
.rstitle{font-size:0.95rem;font-weight:700;}
.rstitle small{color:var(--muted);font-weight:400;font-size:0.78rem;margin-left:5px;}
.xbtn{width:30px;height:30px;background:var(--card2);border:none;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);}
.xbtn svg{width:13px;height:13px;}
.rcards{display:flex;flex-direction:column;gap:8px;margin-bottom:14px;}
.rcard{display:flex;align-items:center;gap:12px;padding:13px;background:var(--card2);border:2px solid transparent;border-radius:15px;cursor:pointer;transition:all 0.2s;}
.rcard.sel{border-color:var(--accent);background:rgba(79,255,176,0.05);}
.rcard:active{transform:scale(0.99);}
.rn{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:0.78rem;font-weight:800;flex-shrink:0;background:var(--border);color:var(--muted);}
.rcard.sel .rn{background:var(--accent);color:#0f1923;}
.ri{flex:1;}
.riname{font-size:0.87rem;font-weight:700;}
.rimeta{font-size:0.72rem;color:var(--muted);margin-top:2px;font-family:'JetBrains Mono',monospace;}
.rtag{display:inline-block;padding:2px 7px;border-radius:4px;font-size:0.6rem;font-weight:700;margin-left:5px;background:rgba(79,255,176,0.12);color:var(--accent);}
.rtag.b{background:rgba(77,171,247,0.12);color:var(--blue);}
.rtag.o{background:rgba(255,146,43,0.12);color:var(--orange);}
.startbtn{width:100%;padding:16px;background:var(--accent);border:none;border-radius:14px;color:#0f1923;font-family:'Plus Jakarta Sans',sans-serif;font-size:1rem;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:9px;box-shadow:0 4px 20px rgba(79,255,176,0.25);}
.startbtn:active{opacity:0.88;}

/* NAV PANEL */
#navpanel{position:fixed;bottom:0;left:0;right:0;z-index:90;transform:translateY(100%);transition:transform 0.4s cubic-bezier(0.23,1,0.32,1);}
#navpanel.up{transform:translateY(0);}
.np{background:var(--card);border-radius:24px 24px 0 0;padding:18px 18px calc(20px + env(safe-area-inset-bottom,0px));box-shadow:0 -8px 40px rgba(0,0,0,0.5);}
.navtop{display:flex;align-items:center;gap:14px;margin-bottom:16px;}
.abox{width:72px;height:72px;border-radius:20px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.3s;}
.abox.s{background:var(--accent);box-shadow:0 4px 18px rgba(79,255,176,0.3);}
.abox.l{background:var(--blue);box-shadow:0 4px 18px rgba(77,171,247,0.3);}
.abox.r{background:var(--orange);box-shadow:0 4px 18px rgba(255,146,43,0.3);}
.abox.u{background:var(--red);box-shadow:0 4px 18px rgba(255,107,107,0.3);}
.abox.done{background:#a855f7;box-shadow:0 4px 18px rgba(168,85,247,0.3);}
.abox svg{width:40px;height:40px;}
.navinfo{flex:1;min-width:0;}
.navdist{font-size:2.2rem;font-weight:800;letter-spacing:-0.04em;line-height:1;font-family:'JetBrains Mono',monospace;}
.navdist span{font-size:1rem;font-weight:500;color:var(--muted);}
.navstep{font-size:0.9rem;font-weight:600;margin-top:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.navroad{font-size:0.72rem;color:var(--muted);margin-top:3px;font-family:'JetBrains Mono',monospace;}
.navstats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px;}
.nst{background:var(--card2);border:1px solid var(--border);border-radius:13px;padding:11px 8px;text-align:center;}
.nstv{font-size:1rem;font-weight:800;font-family:'JetBrains Mono',monospace;}
.nstl{font-size:0.6rem;color:var(--muted);margin-top:2px;font-weight:600;letter-spacing:0.05em;text-transform:uppercase;}
.navbtns{display:flex;gap:8px;}
.nb{flex:1;padding:11px 6px;background:var(--card2);border:1.5px solid var(--border);border-radius:12px;color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;font-size:0.74rem;font-weight:700;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;}
.nb:active{transform:scale(0.96);}
.nb svg{width:17px;height:17px;}
.nb.stop{color:var(--red);}

/* MISC */
#prog{position:fixed;top:0;left:0;right:0;height:3px;z-index:200;background:var(--border);}
#progbar{height:100%;background:linear-gradient(90deg,var(--accent),var(--blue));width:0%;transition:width 0.8s linear;}
#spdhud{position:fixed;right:14px;z-index:91;background:rgba(21,31,46,0.92);border:1.5px solid var(--border);border-radius:16px;padding:10px 14px;text-align:center;backdrop-filter:blur(12px);display:none;top:calc(60px + env(safe-area-inset-top,0px));}
#spdhud.show{display:block;}
.spdn{font-size:1.7rem;font-weight:800;font-family:'JetBrains Mono',monospace;line-height:1;}
.spdu{font-size:0.58rem;color:var(--muted);font-weight:600;letter-spacing:0.08em;}
#locbtn{position:fixed;right:14px;z-index:91;width:44px;height:44px;background:rgba(21,31,46,0.92);border:1.5px solid var(--border);border-radius:13px;display:flex;align-items:center;justify-content:center;cursor:pointer;backdrop-filter:blur(12px);top:calc(62px + env(safe-area-inset-top,0px));}
#locbtn svg{width:21px;height:21px;color:var(--muted);}
#toast{position:fixed;top:calc(60px + env(safe-area-inset-top,0px));left:50%;transform:translateX(-50%) translateY(-8px);z-index:300;background:rgba(21,31,46,0.95);border:1px solid var(--border);color:var(--text);padding:10px 18px;border-radius:50px;font-size:0.8rem;font-weight:600;opacity:0;transition:all 0.3s;white-space:nowrap;backdrop-filter:blur(16px);}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
#loading{position:fixed;inset:0;z-index:400;background:rgba(15,25,35,0.85);display:none;align-items:center;justify-content:center;flex-direction:column;gap:14px;backdrop-filter:blur(8px);}
#loading.on{display:flex;}
.spin{width:42px;height:42px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.spinmsg{font-size:0.8rem;color:var(--muted);font-family:'JetBrains Mono',monospace;}
</style>
</head>
<body>

<!-- API MODAL -->
<div id="api-modal">
  <div class="msheet">
    <div class="mhandle"></div>
    <div class="mbrand">
      <div class="micon">
        <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
      </div>
      <div>
        <div class="mname">DRIVE</div>
        <div class="msub">네이버 맵 기반 네비게이션 PWA</div>
      </div>
    </div>

    <div class="mlbl">네이버 클라우드 Client ID</div>
    <input type="text" class="minp" id="nclient" placeholder="네이버 클라우드 Client ID">

    <div class="minfo">
      <p>
        1. <a href="https://console.ncloud.com" target="_blank">console.ncloud.com</a> 접속<br>
        2. <b>Services → AI·NAVER API → Maps</b><br>
        3. <b>Web Dynamic Map</b> 신청 → Application 등록<br>
        4. 서비스 URL에 Netlify 주소 등록<br>
        5. 발급된 <b>Client ID</b> 입력<br><br>
        ✅ 한국 자동차 경로 완벽 지원
      </p>
    </div>

    <button class="mbtn" onclick="applyKey()">🗺️ 지도 불러오기</button>
    <button class="mbtn2" onclick="useDemo()">데모 모드로 체험하기</button>
  </div>
</div>

<div id="loading"><div class="spin"></div><div class="spinmsg" id="spinmsg">불러오는 중...</div></div>
<div id="prog"><div id="progbar"></div></div>
<div id="map"></div>
<div id="toast"></div>

<!-- STATUS BAR -->
<div id="sbar">
  <div class="slogo">DRIVE</div>
  <div class="gpschip"><div class="gpsdot" id="gpsdot"></div><span id="gpstxt">위치확인중</span></div>
</div>

<!-- LOCATE BTN -->
<div id="locbtn" onclick="goToMe()">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/>
    <circle cx="12" cy="12" r="8" stroke-dasharray="3 3" opacity="0.4"/>
  </svg>
</div>

<!-- SEARCH PANEL -->
<div id="spanel">
  <div class="swrap">
    <div class="sinputs">
      <div class="srow">
        <div class="sdot a"></div>
        <input type="text" id="orig" placeholder="출발지 (현재 위치)">
        <div class="swapbtn" onclick="swapIO()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M7 16V4m0 0L3 8m4-4 4 4M17 8v12m0 0 4-4m-4 4-4-4"/>
          </svg>
        </div>
      </div>
      <div class="srow">
        <div class="sdot b"></div>
        <input type="text" id="dest" placeholder="목적지 입력">
      </div>
    </div>
    <button class="gobtn" onclick="searchRoute()">
      <svg viewBox="0 0 24 24" fill="none" stroke="#0f1923" stroke-width="2.5" width="16" height="16">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      경로 탐색
    </button>
  </div>
</div>

<!-- ROUTE SHEET -->
<div id="rsheet">
  <div class="rs">
    <div class="rshandle"></div>
    <div class="rshead">
      <div class="rstitle">🚗 경로 선택 <small id="destlabel"></small></div>
      <button class="xbtn" onclick="closeSheet()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="rcards" id="rcards"></div>
    <button class="startbtn" onclick="startNav()">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="#0f1923"><path d="M5 3l14 9-14 9V3z"/></svg>
      안내 시작
    </button>
  </div>
</div>

<!-- NAV PANEL -->
<div id="navpanel">
  <div class="np">
    <div class="navtop">
      <div class="abox s" id="abox"><svg id="asvg" viewBox="0 0 40 40" fill="none"></svg></div>
      <div class="navinfo">
        <div class="navdist" id="ndist">-- <span>m</span></div>
        <div class="navstep" id="nstep">안내를 시작합니다</div>
        <div class="navroad" id="nroad">--</div>
      </div>
    </div>
    <div class="navstats">
      <div class="nst"><div class="nstv" id="neta">--:--</div><div class="nstl">도착예정</div></div>
      <div class="nst"><div class="nstv" id="nrem">--</div><div class="nstl">남은거리</div></div>
      <div class="nst"><div class="nstv" id="ntime">--분</div><div class="nstl">소요시간</div></div>
    </div>
    <div class="navbtns">
      <button class="nb" onclick="rerouteNav()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 4v6h6M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
        재탐색
      </button>
      <button class="nb stop" onclick="stopNav()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
        종료
      </button>
    </div>
  </div>
</div>

<!-- SPEED HUD -->
<div id="spdhud">
  <div class="spdn" id="spdval">0</div>
  <div class="spdu">km/h</div>
</div>

<script>
// ── STATE ──
let map, clientId = 'g3qmmw6jbk', demoMode = false;
let navActive = false, navTimer = null, curStep = 0;
let allRoutes = [], selIdx = 0, navSteps = [];
let userPos = {lat:37.5665, lng:126.9780};
let userMarker = null, progVal = 0;

if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});

// ── APPLY KEY ──
function applyKey() {
  const inp = document.getElementById('nclient');
  const val = inp.value.trim();
  if (!val) { inp.style.borderColor='var(--red)'; inp.focus(); return; }
  inp.style.borderColor = 'var(--accent)';
  clientId = val;
  document.getElementById('api-modal').style.display = 'none';
  loadNaverMap();
}
function useDemo() {
  demoMode = true;
  document.getElementById('api-modal').style.display = 'none';
  initDemoMap(); tryGPS();
}

// ── LOAD NAVER MAP ──
function loadNaverMap() {
  showSpin('네이버 지도 불러오는 중...');
  const old = document.getElementById('nms'); if (old) old.remove();
  const s = document.createElement('script');
  s.id = 'nms';
  s.src = `https://oapi.map.naver.com/openapi/v3/maps.js?ncpClientId=${clientId}&submodules=geocoder`;
  s.onload = () => {
    hideSpin();
    try {
      initNaverMap();
      tryGPS();
    } catch(e) {
      console.error('네이버 지도 초기화 실패:', e);
      document.getElementById('api-modal').style.display = 'flex';
      alert('네이버 지도 초기화 실패\n\n' + e.message);
    }
  };
  s.onerror = () => {
    hideSpin();
    document.getElementById('api-modal').style.display = 'flex';
    const inp = document.getElementById('nclient');
    inp.style.borderColor = 'var(--red)'; inp.value = ''; inp.placeholder = '❌ Client ID 오류';
    alert('❌ 네이버 Client ID 오류\n\n확인사항:\n1. Client ID 정확히 입력\n2. 서비스 URL에 현재 도메인 등록\n3. Web Dynamic Map 신청 완료');
  };
  document.head.appendChild(s);
}

// ── INIT NAVER MAP ──
function initNaverMap() {
  const mapDiv = document.getElementById('map');
  mapDiv.style.width = window.innerWidth + 'px';
  mapDiv.style.height = window.innerHeight + 'px';

  map = new naver.maps.Map(mapDiv, {
    center: new naver.maps.LatLng(userPos.lat, userPos.lng),
    zoom: 15,
    mapTypeId: naver.maps.MapTypeId.NORMAL,
    size: new naver.maps.Size(window.innerWidth, window.innerHeight),
  });

  // 크기 재조정
  setTimeout(() => {
    naver.maps.Event.trigger(map, 'resize');
    map.setCenter(new naver.maps.LatLng(userPos.lat, userPos.lng));
  }, 300);
  userMarker = new naver.maps.Marker({
    position: new naver.maps.LatLng(userPos.lat, userPos.lng),
    map,
    icon: {
      content: '<div style="width:18px;height:18px;background:#4fffb0;border:3px solid #0f1923;border-radius:50%;box-shadow:0 0 10px rgba(79,255,176,0.6)"></div>',
      anchor: new naver.maps.Point(9, 9),
    }
  });
  setGPS('GPS 연결됨', true);
}

// ── GPS ──
function tryGPS() {
  if (!navigator.geolocation) return;
  navigator.geolocation.watchPosition(p => {
    userPos = {lat:p.coords.latitude, lng:p.coords.longitude};
    if (map && userMarker) {
      const pos = new naver.maps.LatLng(userPos.lat, userPos.lng);
      userMarker.setPosition(pos);
    }
    setGPS('GPS 정확', true);
  }, () => setGPS('위치 미허용', false), {enableHighAccuracy:true});
}
function goToMe() {
  if (map) map.setCenter(new naver.maps.LatLng(userPos.lat, userPos.lng));
}
function setGPS(t, live) {
  document.getElementById('gpstxt').textContent = t;
  document.getElementById('gpsdot').className = 'gpsdot' + (live ? ' live' : '');
}
function swapIO() {
  const o = document.getElementById('orig'), d = document.getElementById('dest');
  [o.value, d.value] = [d.value, o.value];
}

// ── SEARCH ROUTE (네이버 Directions API 서버사이드 필요 → CORS 우회용 프록시) ──
// 네이버 Directions API는 서버사이드에서만 호출 가능
// 클라이언트에서는 Geocoding으로 좌표 변환 후 경로 시뮬레이션
async function searchRoute() {
  const dest = document.getElementById('dest').value.trim();
  if (!dest) { document.getElementById('dest').focus(); showToast('목적지를 입력하세요'); return; }
  showSpin('경로 탐색 중...');

  if (demoMode || !window.naver) {
    setTimeout(() => { hideSpin(); buildDemoCards(dest); }, 900);
    return;
  }

  const originVal = document.getElementById('orig').value.trim();

  try {
    // 출발지 좌표 변환
    const originCoord = originVal
      ? await geocode(originVal)
      : {lat: userPos.lat, lng: userPos.lng};

    // 목적지 좌표 변환
    const destCoord = await geocode(dest);

    if (!originCoord || !destCoord) {
      hideSpin();
      showToast('주소를 찾을 수 없습니다');
      return;
    }

    // 지도에 출발/도착 마커 표시
    drawRoute(originCoord, destCoord, originVal || '현재위치', dest);
    hideSpin();

  } catch(e) {
    hideSpin();
    showToast('경로 탐색 중 오류가 발생했습니다');
    console.error(e);
  }
}

// ── GEOCODE (네이버 Geocoding) ──
function geocode(address) {
  return new Promise((resolve, reject) => {
    naver.maps.Service.geocode({ query: address }, (status, res) => {
      if (status === naver.maps.Service.Status.OK && res.v2.addresses.length > 0) {
        const addr = res.v2.addresses[0];
        resolve({ lat: parseFloat(addr.y), lng: parseFloat(addr.x), name: addr.roadAddress || addr.jibunAddress });
      } else {
        resolve(null);
      }
    });
  });
}

// ── DRAW ROUTE ──
function drawRoute(origin, dest, originName, destName) {
  // 기존 폴리라인 제거
  if (window.routePolyline) window.routePolyline.setMap(null);
  if (window.originMarkerObj) window.originMarkerObj.setMap(null);
  if (window.destMarkerObj) window.destMarkerObj.setMap(null);

  const oPos = new naver.maps.LatLng(origin.lat, origin.lng);
  const dPos = new naver.maps.LatLng(dest.lat, dest.lng);

  // 출발 마커
  window.originMarkerObj = new naver.maps.Marker({
    position: oPos, map,
    icon: { content: '<div style="padding:4px 8px;background:#4fffb0;color:#0f1923;border-radius:6px;font-size:11px;font-weight:700;white-space:nowrap">출발</div>' }
  });
  // 도착 마커
  window.destMarkerObj = new naver.maps.Marker({
    position: dPos, map,
    icon: { content: '<div style="padding:4px 8px;background:#ff922b;color:white;border-radius:6px;font-size:11px;font-weight:700;white-space:nowrap">도착</div>' }
  });

  // 직선 경로 (네이버 Directions API CORS 제한으로 직선 표시)
  window.routePolyline = new naver.maps.Polyline({
    path: [oPos, dPos],
    strokeColor: '#4fffb0',
    strokeWeight: 5,
    strokeOpacity: 0.8,
    strokeStyle: 'solid',
    map,
  });

  // 두 좌표가 모두 보이도록 지도 조정
  const bounds = new naver.maps.LatLngBounds(oPos, dPos);
  map.fitBounds(bounds, { top:80, right:40, bottom:200, left:40 });

  // 거리 계산 (직선)
  const dist = calcDist(origin.lat, origin.lng, dest.lat, dest.lng);
  const drivingDist = Math.round(dist * 1.4); // 실제 도로는 직선의 약 1.4배
  const mins = Math.round(drivingDist / 40 * 60); // 평균 40km/h

  buildSimpleCards(originName, destName, drivingDist, mins);
}

// ── DISTANCE CALC ──
function calcDist(lat1, lng1, lat2, lng2) {
  const R = 6371;
  const dLat = (lat2-lat1) * Math.PI/180;
  const dLng = (lng2-lng1) * Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// ── ROUTE CARDS ──
function buildSimpleCards(originName, destName, distKm, mins) {
  document.getElementById('destlabel').textContent = '→ ' + destName;
  const c = document.getElementById('rcards'); c.innerHTML = '';
  const routes = [
    {n:'추천 경로', t:'추천', cls:'', d:distKm, m:mins},
    {n:'무료도로 경유', t:'무료', cls:'b', d:Math.round(distKm*1.1), m:Math.round(mins*1.2)},
    {n:'최단 경로', t:'최단', cls:'o', d:Math.round(distKm*0.95), m:Math.round(mins*1.1)},
  ];
  routes.forEach((r, i) => {
    const el = document.createElement('div');
    el.className = 'rcard' + (i===0?' sel':'');
    const dk = r.d >= 1 ? r.d.toFixed(1)+'km' : Math.round(r.d*1000)+'m';
    el.innerHTML = `<div class="rn">${i+1}</div><div class="ri">
      <div class="riname">${r.n} <span class="rtag ${r.cls}">${r.t}</span></div>
      <div class="rimeta">🚗 ${r.m}분 · ${dk}</div></div>`;
    el.onclick = () => {
      document.querySelectorAll('.rcard').forEach(x=>x.classList.remove('sel'));
      el.classList.add('sel'); selIdx = i;
      allRoutes[i] && null;
    };
    c.appendChild(el);
  });
  allRoutes = routes;
  openSheet();
}

function buildDemoCards(dest) {
  document.getElementById('destlabel').textContent = '→ ' + dest;
  const demos = [
    {n:'추천 경로', m:'🚗 23분 · 12.4km', t:'추천', c:''},
    {n:'무료도로 경유', m:'🚗 31분 · 10.2km', t:'무료', c:'b'},
    {n:'최단 경로', m:'🚗 28분 · 9.8km', t:'최단', c:'o'},
  ];
  const c = document.getElementById('rcards'); c.innerHTML = '';
  demos.forEach((r, i) => {
    const el = document.createElement('div');
    el.className = 'rcard' + (i===0?' sel':'');
    el.innerHTML = `<div class="rn">${i+1}</div><div class="ri">
      <div class="riname">${r.n} <span class="rtag ${r.c}">${r.t}</span></div>
      <div class="rimeta">${r.m}</div></div>`;
    el.onclick = () => {
      document.querySelectorAll('.rcard').forEach(x=>x.classList.remove('sel'));
      el.classList.add('sel'); selIdx = i;
    };
    c.appendChild(el);
  });
  openSheet();
}

function openSheet() {
  document.getElementById('rsheet').classList.add('up');
  document.getElementById('spanel').style.opacity = '0.4';
  document.getElementById('spanel').style.pointerEvents = 'none';
}
function closeSheet() {
  document.getElementById('rsheet').classList.remove('up');
  document.getElementById('spanel').style.opacity = '';
  document.getElementById('spanel').style.pointerEvents = '';
}

// ── DEMO STEPS ──
const DSTEPS = [
  {dist:'500', unit:'m', step:'직진 후 신호등에서 좌회전', road:'테헤란로', dir:'s'},
  {dist:'1.2', unit:'km', step:'좌회전하세요', road:'강남대로', dir:'l'},
  {dist:'300', unit:'m', step:'우회전 후 직진', road:'역삼로', dir:'r'},
  {dist:'800', unit:'m', step:'계속 직진하세요', road:'선릉로', dir:'s'},
  {dist:'200', unit:'m', step:'좌회전 후 목적지', road:'목적지 인근', dir:'l'},
  {dist:'50',  unit:'m', step:'목적지에 도착합니다 🎉', road:'목적지', dir:'done'},
];

// ── START NAV ──
function startNav() {
  closeSheet();
  document.getElementById('navpanel').classList.add('up');
  document.getElementById('spanel').style.display = 'none';
  document.getElementById('spdhud').classList.add('show');
  document.getElementById('locbtn').style.display = 'none';
  navActive = true; curStep = 0; progVal = 0;

  const route = allRoutes[selIdx];
  if (route && route.m) {
    setStats(route.m * 60, route.d * 1000);
  } else {
    setStats(23*60, 12400);
  }
  showDStep(DSTEPS[0]);

  navTimer = setInterval(() => {
    simSpeed();
    progVal = Math.min(progVal + 100/DSTEPS.length, 100);
    document.getElementById('progbar').style.width = progVal + '%';
    curStep++;
    if (curStep < DSTEPS.length) {
      showDStep(DSTEPS[curStep]);
      const rem = DSTEPS.length - 1 - curStep;
      setStats(rem * 3 * 60, rem * 2000);
    } else {
      arrived();
    }
  }, 7000);
}

function showDStep(s) {
  document.getElementById('ndist').innerHTML = s.dist + ' <span>' + s.unit + '</span>';
  document.getElementById('nstep').textContent = s.step;
  document.getElementById('nroad').textContent = s.road;
  setArrow(s.dir);
}
function setStats(secs, distM) {
  const eta = new Date(Date.now() + secs*1000);
  document.getElementById('neta').textContent = String(eta.getHours()).padStart(2,'0')+':'+String(eta.getMinutes()).padStart(2,'0');
  document.getElementById('nrem').textContent = distM>=1000?(distM/1000).toFixed(1)+'km':Math.round(distM)+'m';
  document.getElementById('ntime').textContent = Math.ceil(secs/60)+'분';
}

function setArrow(dir) {
  const box = document.getElementById('abox'), svg = document.getElementById('asvg');
  box.className = 'abox';
  let p = '';
  if (dir==='l'||dir?.includes('left'))       { box.classList.add('l'); p=`<path d="M28 32 L10 20 L28 8" stroke="white" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M10 20 L36 20" stroke="white" stroke-width="4.5" stroke-linecap="round"/>`; }
  else if (dir==='r'||dir?.includes('right')) { box.classList.add('r'); p=`<path d="M12 32 L30 20 L12 8" stroke="white" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M30 20 L4 20" stroke="white" stroke-width="4.5" stroke-linecap="round"/>`; }
  else if (dir==='u'||dir?.includes('uturn')) { box.classList.add('u'); p=`<path d="M10 30 L10 16 Q10 6 20 6 Q30 6 30 16 L30 26" stroke="white" stroke-width="4" stroke-linecap="round" fill="none"/><path d="M24 20 L30 26 L36 20" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>`; }
  else if (dir==='done')                      { box.classList.add('done'); p=`<circle cx="20" cy="20" r="10" stroke="white" stroke-width="3" fill="none"/><circle cx="20" cy="20" r="4" fill="white"/><path d="M20 5v5M20 30v5M5 20h5M30 20h5" stroke="white" stroke-width="2.5" stroke-linecap="round"/>`; }
  else                                         { box.classList.add('s'); p=`<path d="M20 34 L20 6" stroke="white" stroke-width="4.5" stroke-linecap="round"/><path d="M11 15 L20 6 L29 15" stroke="white" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>`; }
  svg.innerHTML = p;
}

function arrived() {
  clearInterval(navTimer);
  document.getElementById('ndist').innerHTML = '0 <span>m</span>';
  document.getElementById('nstep').textContent = '목적지에 도착했습니다! 🎉';
  document.getElementById('nroad').textContent = '안내 종료';
  document.getElementById('nrem').textContent = '0m';
  document.getElementById('ntime').textContent = '0분';
  document.getElementById('progbar').style.width = '100%';
  setArrow('done'); showToast('🎉 목적지 도착!');
}

function stopNav() {
  clearInterval(navTimer); navActive = false;
  document.getElementById('navpanel').classList.remove('up');
  document.getElementById('spanel').style.display = 'block';
  document.getElementById('spanel').style.opacity = '';
  document.getElementById('spanel').style.pointerEvents = '';
  document.getElementById('spdhud').classList.remove('show');
  document.getElementById('locbtn').style.display = 'flex';
  document.getElementById('progbar').style.width = '0%';
  if (window.routePolyline) window.routePolyline.setMap(null);
  if (window.originMarkerObj) window.originMarkerObj.setMap(null);
  if (window.destMarkerObj) window.destMarkerObj.setMap(null);
}

function rerouteNav() { showToast('경로 재탐색 중...'); }
function simSpeed() { document.getElementById('spdval').textContent = Math.floor(30+Math.random()*60); }
function showSpin(m) { document.getElementById('spinmsg').textContent=m; document.getElementById('loading').classList.add('on'); }
function hideSpin() { document.getElementById('loading').classList.remove('on'); }
function showToast(m) {
  const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('api-modal').style.display = 'none';
  loadNaverMap();
});

document.addEventListener('keydown', e => {
  if (e.key==='Enter') searchRoute();
  if (e.key==='Escape'&&navActive) stopNav();
});
</script>
